  <!-- Secondary inner curve -->
  <path d="M50 30 C55 42, 58 55, 56 68 C54 78, 52 86, 50 93" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
