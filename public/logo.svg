<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main leaf shape -->
  <path d="M50 8 C25 20, 18 45, 22 65 C26 85, 40 95, 50 95 C60 95, 74 85, 78 65 C82 45, 75 20, 50 8Z" fill="url(#leafGrad)"/>
  <!-- Inner curve/vein to create the split leaf effect -->
